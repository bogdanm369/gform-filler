# One worker thread is started for each name in formfiller.names.
formfiller.names=identitatevizuala,scalacev

# Global HTTP settings. Every submission uses a fresh stateless HTTP request,
# so the runtime behaves like an incognito session: no cookies, no saved profile.
formfiller.http.connect-timeout-seconds=30
formfiller.http.read-timeout-seconds=60
# formfiller.http.user-agent=Mozilla/5.0 (...) Chrome/136.0.0.0 Safari/537.36

formfiller.identitatevizuala.enabled=true
formfiller.identitatevizuala.link=https://docs.google.com/forms/d/e/1FAIpQLSdADWLOuSV_KSZn31nIjM9MXlpLQ2cnn6X8OMGB8uhX8U-_EQ/viewform?usp=header
formfiller.identitatevizuala.questions-file=questionnaires/identitatevizuala.questions.properties
# Fixed value: 60
# Random per tick: 100-300
formfiller.identitatevizuala.interval-seconds=95-450

# Optional: stop after N fills for this form. 0 means run forever.
formfiller.identitatevizuala.fill-count=22


formfiller.scalacev.enabled=true
formfiller.scalacev.link=https://docs.google.com/forms/d/e/1FAIpQLSfWh4QJlVzX4ngce4aAvyg_JW6_jvLQ4gh-kfxr--jBMKLexg/viewform?usp=header
formfiller.scalacev.questions-file=questionnaires/scalacev.questions.properties
# Fixed value: 60
# Random per tick: 100-300
formfiller.scalacev.interval-seconds=130-290

# Optional: stop after N fills for this form. 0 means run forever.
formfiller.scalacev.fill-count=27

